# bootstrap.conf.yml
# Single host-wide configuration: provisioning capability flags and
# toolchain version pins.
#
# Copy this file to bootstrap.conf.yml and customise for each host.
# A hostname-specific override (<hostname>.conf.yml) is also supported
# — it takes precedence over bootstrap.conf.yml when present.
#
# ── Capabilities ────────────────────────────────────────────────────────────
#
# Each flag controls a group of init.d steps. Steps declare required
# capabilities via a `.requires` file in their step directory (one capability
# name per line). A step whose `.requires` lists at least one disabled
# capability is skipped. Steps without a `.requires` file always run.
#
#   docker  Docker CE + lazydocker. Required for any host that runs containers
#           (app servers, CI runners, registries).
#
#   kvm     KVM virtualization: qemu-kvm, libvirt, virtinst, bridge-utils.
#           Required for hosts that run VMs.
#
#   dev     User-tier dev toolchain: uv, Python, Go, Node.js, kilo, direnv,
#           llmdocs, and user scripts. Enable on dev workstations and CI/build
#           hosts; disable on pure deployment / infrastructure servers.
#
#   public  CrowdSec IPS (LAPI + iptables bouncer + Central API). Enable on
#           internet-facing servers; disable on internal/private hosts.

capabilities:
  docker: true
  kvm: false
  dev: false
  public: false

# ── Versions ─────────────────────────────────────────────────────────────────
#
# Pins the installed version of each tool. Three formats are accepted:
#
#   "latest"   auto-resolve to the newest stable release at install time
#   "24"       resolve to the newest 24.x.y (major-only pin)
#   "1.26"     resolve to the newest 1.26.x (major.minor pin)
#   "1.26.4"   install exactly this version (fully-specified pin)
#
# Partial resolution (major or major.minor) is supported for go and node.
# uv, kilo, and python accept "latest" or a fully-specified version.
# Omit a tool (or delete the versions: section) to default to "latest".
#
# Supported tools: uv, python, kilo, go, node

versions:
  uv: "latest"
  python: "3.13"
  kilo: "latest"
  go: "latest"
  node: "latest"
