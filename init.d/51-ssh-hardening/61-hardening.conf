# Managed by bootstrap/init.d/51-ssh-hardening. Do not edit by hand.
#
# Round 1: connection hardening and forwarding policy.
# AllowTcpForwarding and AllowAgentForwarding are required for VS Code
# remote and SSH agent chaining — do not disable.

AllowTcpForwarding yes
AllowAgentForwarding yes
ClientAliveCountMax 2
LogLevel VERBOSE
MaxAuthTries 5
MaxSessions 3
TCPKeepAlive no
X11Forwarding no
LoginGraceTime 20
